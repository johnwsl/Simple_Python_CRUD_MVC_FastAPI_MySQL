services:
  mysql:
    image: mysql:8.0
    container_name: crud_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-crud_db}
      MYSQL_USER: ${MYSQL_USER:-crud_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-crud_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build: .
    image: ${DOCKERHUB_USERNAME:-seu-usuario}/crud-fastapi-mysql:latest
    container_name: crud_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-crud_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-crud_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-crud_db}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    ports:
      - "8000:8000"

volumes:
  mysql_data:
